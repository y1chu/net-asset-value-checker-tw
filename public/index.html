<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0e1116" media="(prefers-color-scheme: dark)" />
<title>基金即時估值</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="styles.css" />
<script>
  // Resolve theme before first paint to avoid a flash.
  (function () {
    try {
      var t = localStorage.getItem('theme');
      if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  })();
</script>
</head>
<body>
<header class="app-header">
  <div class="header-row">
    <div class="header-left">
      <button type="button" id="menuBtn" class="icon-btn menu-btn" aria-label="常用基金" aria-expanded="false" aria-controls="drawer">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><g stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></g></svg>
        <span id="favCount" class="fav-count hidden"></span>
      </button>
      <div class="brand">
        <span class="brand-name">基金即時估值</span>
      </div>
    </div>
    <button type="button" id="themeBtn" class="icon-btn" aria-label="切換深淺色">
      <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><circle cx="12" cy="12" r="4.2" fill="currentColor"/><g stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="12" y1="2.5" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21.5"/><line x1="2.5" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21.5" y2="12"/><line x1="5.2" y1="5.2" x2="6.9" y2="6.9"/><line x1="17.1" y1="17.1" x2="18.8" y2="18.8"/><line x1="18.8" y1="5.2" x2="17.1" y2="6.9"/><line x1="6.9" y1="17.1" x2="5.2" y2="18.8"/></g></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M15.5 2.5a9.5 9.5 0 1 0 6 15.2A8 8 0 0 1 15.5 2.5z"/></svg>
    </button>
  </div>

  <form id="fundForm" autocomplete="off" role="search">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="codeInput" spellcheck="false" enterkeyhint="search"
             placeholder="搜尋基金名稱或代碼" aria-label="搜尋基金名稱或代碼" />
      <button type="button" id="clearBtn" class="clear-btn hidden" aria-label="清除">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <ul id="suggest" class="suggest hidden" role="listbox" aria-label="搜尋結果"></ul>
    </div>
  </form>

</header>

<!-- Favorites drawer -->
<div id="drawer" class="drawer">
  <div class="drawer-overlay" data-close></div>
  <aside class="drawer-panel" role="dialog" aria-modal="true" aria-label="常用基金">
    <div class="drawer-head">
      <span class="drawer-title">常用基金</span>
      <button type="button" class="icon-btn drawer-close" data-close aria-label="關閉">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div id="favList" class="fav-list"></div>
    <p class="drawer-hint">搜尋基金後，點右上角 ★ 加入常用。</p>
  </aside>
</div>

<main id="main" class="app-main" data-state="empty">

  <!-- Empty state -->
  <section class="state-empty">
    <div class="empty-glyph" aria-hidden="true"></div>
    <p class="empty-title">看今天該不該買</p>
    <p class="empty-hint">搜尋基金名稱或代碼，即時估算今日漲跌。</p>
  </section>

  <!-- Fund card: hero + trust strip -->
  <section class="fund-card" aria-live="polite">
    <div class="fund-head">
      <h1 id="fundName" class="fund-name">
        <span class="skeleton skel-name"></span>
      </h1>
      <button id="starBtn" class="star-btn" aria-label="加入常用" aria-pressed="false">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path class="star-path" d="M12 3.4l2.6 5.27 5.82.85-4.21 4.1.99 5.8L12 16.7l-5.2 2.72.99-5.8-4.21-4.1 5.82-.85z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="hero">
      <div id="estArrow" class="est-arrow" aria-hidden="true"></div>
      <div id="estMove" class="est-move"><span class="skeleton skel-hero"></span></div>
      <div class="est-label">今日估算漲跌</div>
      <div class="est-sub">依已揭露持股加權估算</div>
      <div id="estError" class="est-error"></div>
    </div>

    <dl id="trust" class="trust-strip"></dl>
  </section>

  <!-- Holdings -->
  <section class="holdings-section">
    <div class="section-head">
      <span class="section-label">持股明細</span>
      <span class="section-note">前十大 · 依權重</span>
    </div>
    <table class="holdings">
      <thead>
        <tr>
          <th scope="col">個股</th>
          <th scope="col" class="num">權重</th>
          <th scope="col" class="num">現價</th>
          <th scope="col" class="num">漲跌</th>
          <th scope="col" class="num">貢獻</th>
        </tr>
      </thead>
      <tbody id="holdingsBody"></tbody>
    </table>
    <p class="disclaimer">
      估算僅涵蓋每月揭露之前十大持股，非完整投資組合，與基金公司公告淨值必有落差，僅供判斷當日方向參考。
    </p>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
